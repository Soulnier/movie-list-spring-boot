<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MovieList - Вход</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        img.logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            text-align: left;
            margin: 10px 0 5px;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .register-link {
            margin-top: 15px;
            font-size: 14px;
        }
        .register-link a {
            color: #4CAF50;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <img th:src="@{/images/VideoIcon.png}" alt="MovieList Logo" class="logo"/>
    <h1>Вход в MovieList</h1>

    <div th:if="${param.error}" class="error">
        Не удалось войти. Проверьте имя пользователя и пароль.
    </div>

    <form method="POST" th:action="@{/login}" id="loginForm">
        <label for="username">Имя пользователя:</label>
        <input type="text" name="username" id="username" required/>

        <label for="password">Пароль:</label>
        <input type="password" name="password" id="password" required/>

        <input type="submit" value="Войти"/>
    </form>

    <p class="register-link">
        Впервые здесь? <a th:href="@{/register}">Зарегистрируйтесь</a>
    </p>
</div>
</body>
</html>
