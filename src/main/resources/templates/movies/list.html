<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои фильмы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .btn {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            margin-right: 5px;
        }
        .btn-edit {
            background-color: #ffc107;
        }
        .btn-delete {
            background-color: #dc3545;
        }
        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-add:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
<h1>Моя коллекция фильмов</h1>
<a th:href="@{/movies/new}" class="btn-add">➕ Добавить фильм</a>

<table>
    <thead>
    <tr>
        <th>Название</th>
        <th>Год</th>
        <th>Статус</th>
        <th>Жанры</th>
        <th>Рейтинг</th>
        <th>Отзыв</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="movie : ${movies}">
        <td th:text="${movie.name}">Название</td>
        <td th:text="${movie.releaseYear}">2020</td>
        <td th:text="${movie.watchStatus.displayName}">Статус</td>
        <td>
            <span th:if="${movie.genres != null and !movie.genres.isEmpty()}"
                  th:text="${#strings.listJoin(movie.genres.![name], ', ')}">Жанры</span>
            <span th:if="${movie.genres == null or movie.genres.isEmpty()}">—</span>
        </td>
        <td th:text="${movie.userRating != null ? movie.userRating + '/10' : '—'}">8/10</td>
        <td th:text="${movie.userReview != null ? movie.userReview : '—'}">Отзыв</td>
        <td>
            <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-edit">Редактировать</a>
            <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-delete"
               onclick="return confirm('Удалить фильм?')">Удалить</a>
        </td>
    </tr>
    <tr th:if="${movies.isEmpty()}">
        <td colspan="7" style="text-align: center;">У вас пока нет фильмов. Добавьте первый!</td>
    </tr>
    </tbody>
</table>
<br>
<a th:href="@{/}">На главную</a>
</body>
</html>
